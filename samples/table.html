<!DOCTYPE html><html><head><meta charset="UTF-8"><style>* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: #333;
    background-color: #fff;
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
}

h1, h2, h3, h4, h5, h6 {
    margin-bottom: 12px;
    font-weight: bold;
}

p {
    margin-bottom: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px 12px;
    text-align: left;
}

th {
    background-color: #f0f0f0;
    font-weight: bold;
}

tr:nth-child(even) {
    background-color: #fafafa;
}
</style></head><body><h2>Array Format Table</h2><table>
  <tr>
    <th>name</th>
    <th>age</th>
    <th>city</th>
  </tr>
  <tr>
    <td>mateus</td>
    <td>22</td>
    <td>rio de janeiro</td>
  </tr>
  <tr>
    <td>joao</td>
    <td>23</td>
    <td>sao paulo</td>
  </tr>
  <tr>
    <td>maria</td>
    <td>24</td>
    <td>belo horizonte</td>
  </tr>
</table>
<h2>Object Format Table</h2><table>
  <tr>
    <th>age</th>
    <th>city</th>
    <th>name</th>
  </tr>
  <tr>
    <td>22</td>
    <td>rio de janeiro</td>
    <td>mateus</td>
  </tr>
  <tr>
    <td>23</td>
    <td>sao paulo</td>
    <td>joao</td>
  </tr>
  <tr>
    <td>24</td>
    <td>belo horizonte</td>
    <td>maria</td>
  </tr>
</table>
</body></html>
